name: Debug Test Environment

on:
  workflow_dispatch:

jobs:
  debug:
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-13]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Mason
        uses: actions/checkout@v4

      - name: Debug environment
        run: |
          echo "=== Working Directory ==="
          pwd

          echo ""
          echo "=== GITHUB_WORKSPACE ==="
          echo "$GITHUB_WORKSPACE"

          echo ""
          echo "=== Directory Contents ==="
          ls -la

          echo ""
          echo "=== Mason Script ==="
          ls -la mason || echo "mason not found"
          file mason || echo "file command failed"

          echo ""
          echo "=== Test Directory ==="
          ls -la test/

          echo ""
          echo "=== PATH ==="
          echo "$PATH"

          echo ""
          echo "=== Which commands ==="
          which bash
          which git
          which curl

          echo ""
          echo "=== Bash version ==="
          bash --version

          echo ""
          echo "=== Git config ==="
          git config --list | grep -i user || echo "No user config"

          echo ""
          echo "=== Test mason directly ==="
          ./mason --version || echo "Failed to run mason"

          echo ""
          echo "=== Test with explicit bash ==="
          bash ./mason --version || echo "Failed with explicit bash"

          echo ""
          echo "=== Check script shebangs ==="
          head -1 mason
          head -1 test/unit.sh

          echo ""
          echo "=== Try adding to PATH and running ==="
          export PATH=$(pwd):${PATH}
          echo "New PATH: $PATH"
          which mason || echo "mason not in PATH"
          mason --version || echo "mason command failed"

      - name: Try running unit test
        run: |
          export PATH=$(pwd):${PATH}
          echo "PATH: $PATH"
          ./test/unit.sh || true

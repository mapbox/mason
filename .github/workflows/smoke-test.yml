name: Smoke Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  smoke-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-13]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - name: Checkout Mason
        uses: actions/checkout@v4

      - name: Set up build environment (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl git

      - name: Set up build environment (macOS)
        if: runner.os == 'macOS'
        run: |
          # Ensure Xcode command line tools are available
          xcode-select --print-path

      - name: Display environment info
        run: |
          echo "OS: $(uname -s)"
          echo "Arch: $(uname -m)"
          git --version
          curl --version

      - name: Run unit tests
        run: |
          ./test/unit.sh

      - name: Test basic package install
        run: |
          ./mason install zlib 1.2.8
          ./mason prefix zlib 1.2.8

      - name: Test header-only package install
        run: |
          ./mason install variant 1.1.0
          ./mason prefix variant 1.1.0

      - name: Verify mason commands
        run: |
          ./mason --version
          ./mason env MASON_DIR
